apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-config
  namespace: staging
data:
  APP_ENV: "staging"
  PORT: "3001"
  REDIS_URL: "redis://redis-service.staging.svc.cluster.local:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secret
  namespace: staging
type: Opaque
data:
  # Base64 encoded '1.0.0-staging' => MS4wLjAtc3RhZ2luZw==
  APP_VERSION: MS4wLjAtc3RhZ2luZw==
