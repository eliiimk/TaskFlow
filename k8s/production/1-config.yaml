apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-config
  namespace: production
data:
  APP_ENV: "production"
  PORT: "3001"
  REDIS_URL: "redis://redis-service.production.svc.cluster.local:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secret
  namespace: production
type: Opaque
data:
  # Base64 encoded '1.0.0-production' => MS4wLjAtcHJvZHVjdGlvbg==
  APP_VERSION: MS4wLjAtcHJvZHVjdGlvbg==
